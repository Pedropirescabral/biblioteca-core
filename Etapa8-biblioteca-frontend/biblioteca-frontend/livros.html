<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca — Livros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topo">
  <div class="marca">Biblioteca<span>Municipal</span></div>
  <nav>
    <a href="index.html">Painel</a>
    <a href="livros.html" class="ativo">Livros</a>
    <a href="membros.html">Membros</a>
    <a href="emprestimos.html">Empréstimos</a>
  </nav>
</header>

<main>
  <div class="cabecalho-pagina">
    <div>
      <h1>Acervo de livros</h1>
      <p>Cadastre novos títulos e acompanhe a disponibilidade de exemplares.</p>
    </div>
  </div>

  <section class="painel">
    <h2>Novo livro</h2>
    <div class="mensagem sucesso" id="msg-sucesso" hidden></div>
    <form id="form-livro" novalidate>
      <div class="form-grid">
        <div>
          <label for="titulo">Título *</label>
          <input type="text" id="titulo" name="titulo" required minlength="2">
          <div class="erro-campo" id="erro-titulo"></div>
        </div>
        <div>
          <label for="autor">Autor *</label>
          <input type="text" id="autor" name="autor" required minlength="2">
          <div class="erro-campo" id="erro-autor"></div>
        </div>
        <div>
          <label for="isbn">ISBN</label>
          <input type="text" id="isbn" name="isbn" placeholder="978-0000000000">
          <div class="erro-campo" id="erro-isbn"></div>
        </div>
        <div>
          <label for="quantidade">Quantidade de exemplares *</label>
          <input type="number" id="quantidade" name="quantidade" min="1" step="1" required value="1">
          <div class="erro-campo" id="erro-quantidade"></div>
        </div>
      </div>
      <button type="submit" class="btn" style="margin-top:.5rem;">Cadastrar livro</button>
    </form>
  </section>

  <section class="painel">
    <h2>Livros cadastrados</h2>
    <table>
      <thead>
        <tr><th>Título</th><th>Autor</th><th>ISBN</th><th>Exemplares</th><th>Status</th></tr>
      </thead>
      <tbody id="tabela-livros"></tbody>
    </table>
  </section>
</main>

<footer>Projeto Integrador — Sistema de Biblioteca (front-end estático, Etapa 8)</footer>

<script src="js/dados.js"></script>
<script src="js/validacao.js"></script>
<script src="js/livros.js"></script>
</body>
</html>
