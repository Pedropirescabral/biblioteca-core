# Configuração da aplicação web - Etapa 9

spring.application.name=biblioteca-web
server.port=8080

# Banco de dados H2 em arquivo (persiste entre execuções, fica em ./data/biblioteca.mv.db)
# Para usar MySQL/PostgreSQL em produção, basta trocar estas 4 propriedades.
spring.datasource.url=jdbc:h2:file:./data/biblioteca;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Sempre recria o schema a partir de schema.sql ao iniciar (facilita os testes do professor)
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none

# Console web do H2, útil para inspecionar o banco durante o desenvolvimento
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false
